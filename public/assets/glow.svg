<svg
  width="800"
  height="800"
  viewBox="0 0 800 800"
  xmlns="http://www.w3.org/2000/svg"
>
  <defs>
    <filter id="blur">
      <feGaussianBlur stdDeviation="115" />
    </filter>

    <radialGradient id="glow">
      <stop offset="0%" stop-color="#f1ede7" />
      <stop offset="45%" stop-color="#f1ede7" stop-opacity="0" />
    </radialGradient>
  </defs>

  <circle
    cx="400"
    cy="400"
    r="520"
    fill="url(#glow)"
    filter="url(#blur)"
  />
</svg>